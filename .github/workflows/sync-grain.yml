name: Sync Grain Meetings

on:
  schedule:
    # Runs every day at 11pm CT (5am UTC next day)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to sync'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Sync Grain meetings
        env:
          GRAIN_API_TOKEN: ${{ secrets.GRAIN_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/sync-grain-ci.py --days ${{ github.event.inputs.days || '1' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add context/clients/*/meetings.md
          if git diff --cached --quiet; then
            echo "No new meetings to sync."
          else
            git commit -m "Auto-sync Grain meetings ($(date +%Y-%m-%d))"
            git push
          fi
